<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textarea Papyrus</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            position: relative;
            width: 600px;
            height: 400px;
        }

        textarea {
            width: 100%;
            height: 100%;
            padding: 20px;
            background: transparent;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.5;
            color: #5b4636; /* couleur du texte */
            resize: none; /* désactiver le redimensionnement */
            z-index: 2;
            position: relative;
        }

        .papyrus-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('vintage.avif'); /* image de texture de papyrus avec transparence */
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <form>
        <div class="papyrus-bg"></div>
        <textarea id="message" name="message" placeholder="Écrivez votre message ici..."></textarea>
    </form>
</body>
</html>
