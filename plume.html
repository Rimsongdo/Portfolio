<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feuille Vintage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
        }

        #vintagePaper {
            background-image: url('vintage.avif'); /* Image de la feuille vintage */
            background-size: cover;
            width: 100%;
            min-height: 200px;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
            color: #333;
            white-space: pre-wrap; /* Pour gérer les retours à la ligne */
            margin-top: 10px; /* Définir l'endroit à partir duquel on commence à écrire */
        }
    </style>
</head>
<body>
    <div class="container">
        <textarea id="userInput" placeholder="Saisissez votre texte ici..."></textarea>
        <div id="vintagePaper"></div>
    </div>
    <script>
        const userInput = document.getElementById('userInput');
        const vintagePaper = document.getElementById('vintagePaper');

        userInput.addEventListener('input', function() {
            const maxLength = 40; // Nombre maximum de caractères par ligne
            const lines = userInput.value.split('\n');
            const formattedLines = lines.map(line => {
                if (line.length > maxLength) {
                    let formattedLine = '';
                    for (let i = 0; i < line.length; i += maxLength) {
                        formattedLine += line.substring(i, i + maxLength) + '\n';
                    }
                    return formattedLine;
                } else {
                    return line;
                }
            });
            vintagePaper.innerText = formattedLines.join('\n');
        });
    </script>
</body>
</html>
